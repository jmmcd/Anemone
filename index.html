<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anemone Interactive Evolutionary Algorithm</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top app bar: persistent chrome. On wide pointer-fine screens it carries
         an inline Evolve button; on touch/narrow that role moves to the FAB. -->
    <header class="app-bar">
        <button id="menu-btn" class="icon-btn" aria-label="Open controls">☰</button>
        <h1 class="app-title">Anemone</h1>
        <span class="gen-indicator">Gen <span id="generation">0</span></span>
        <button id="evolve-btn" class="evolve-bar">
            Evolve<span class="sel-badge" id="selected-count-bar">0</span>
        </button>
    </header>

    <main class="container">
        <a href="#" id="about-link" class="about-link">About</a>
        <div class="grid" id="grid"></div>
    </main>

    <!-- Floating Evolve button (touch / narrow): thumb-reachable. -->
    <button id="evolve-fab" class="fab" aria-label="Evolve next generation">
        <span class="fab-icon">⟳</span>
        <span class="sel-badge" id="selected-count-fab">0</span>
    </button>

    <!-- Auxiliary controls drawer (everywhere). -->
    <div id="drawer-scrim" class="scrim"></div>
    <aside id="drawer" class="drawer" aria-label="Controls">
        <div class="drawer-header">
            <h2>Controls</h2>
            <button id="drawer-close" class="icon-btn" aria-label="Close controls">✕</button>
        </div>

        <section class="drawer-section">
            <h3>Population</h3>
            <button id="reset-btn" class="secondary-btn">Reset</button>
            <button id="load-png-btn" class="secondary-btn">Load…</button>
            <input type="file" id="load-png-input" accept="image/png,audio/wav,.wav,audio/midi,.mid,.midi" style="display: none;">
            <button id="save-population-btn" class="secondary-btn">Save Population</button>
            <button id="save-liked-btn" class="secondary-btn">Save Liked (ZIP)</button>
            <div class="info-line">
                Selected <span id="selected-count">0</span> ·
                Pop <span id="population-size">16</span> ·
                Avg <span id="avg-fitness">0.00</span>
            </div>
        </section>

        <section class="drawer-section">
            <h3>Individual Type</h3>
            <select id="individual-type-select">
                <option value="PatternIndividual">Pattern</option>
                <option value="PatternGrammarIndividual">Pattern (Grammar)</option>
                <!-- AnimatedPatternIndividual hidden: too heavy for mobile/old hardware -->
                <option value="PolarCurveIndividual">Polar Curve</option>
                <option value="ShapesIndividual">Shapes</option>
                <option value="PhotoFilterIndividual">Photo Filter</option>
                <option value="AntRenderingIndividual">Ant Rendering</option>
                <option value="AudioFilterIndividual">Audio Filter</option>
                <option value="DrumMachineIndividual">Drum Machine</option>
                <option value="GridIndividual">Grid</option>
                <option value="SuperShapeIndividual">Supershape</option>
                <option value="SuperShape3DIndividual">Supershape 3D</option>
                <option value="PetalSphere3DIndividual">Petal Sphere 3D</option>
                <option value="FreeSurface3DIndividual">Free Surface 3D</option>
                <option value="WarpedSurface3DIndividual">Warped Surface 3D</option>
                <option value="AnemoneIndividual" selected>Anemone</option>
                <option value="BranchIndividual">Branch</option>
                <option value="LSystemIndividual">L-System</option>
                <option value="BlindWatchmakerIndividual">Blind Watchmaker</option>
                <option value="RobotIndividual">Robot</option>
                <option value="WonkyGuysIndividual">Wonky Guys</option>
                <option value="HoxCreatureIndividual">Bug</option>
                <option value="SheepIndividual">Sheep</option>
                <option value="PenroseIndividual">Penrose</option>
                <option value="PSystemIndividual">P-System</option>
                <option value="MelodyIndividual">Melody Grid</option>
                <option value="MouseMusicIndividual">Mouse Music</option>
                <option value="EEGSonificationIndividual">EEG Sonification</option>
            </select>
        </section>

        <section class="drawer-section eeg-section">
            <h3>EEG Data</h3>
            <button id="eeg-load-btn" class="secondary-btn">Load EEG CSV</button>
            <input type="file" id="eeg-csv-input" accept=".csv" style="display: none;">
            <span id="eeg-status"><em>No data</em></span>
        </section>

        <section class="drawer-section" id="palette-section">
            <h3>Palette</h3>
            <div id="extensions-container" class="extensions-container"></div>
        </section>

        <section class="drawer-section">
            <h3>Generation History</h3>
            <div id="history-list" class="history-list"></div>
        </section>

        <footer class="drawer-footer">
            <a href="https://github.com/jmmcd/anemone" target="_blank" rel="noopener noreferrer">View on GitHub</a>
        </footer>
    </aside>

    <!-- Placement banner: shown after loading a PNG, while the user picks the
         grid tile to replace with the loaded individual. -->
    <div id="place-banner" class="place-banner">
        <canvas id="place-preview" width="64" height="64"></canvas>
        <span class="place-text">Click a tile to replace it with this loaded individual.</span>
        <button id="place-cancel" class="secondary-btn">Cancel</button>
    </div>

    <!-- About page (opened from the link above the grid; closes back to it). -->
    <div id="about-modal" class="lightbox about-modal">
        <div class="lightbox-inner about-inner">
            <button id="about-close" class="icon-btn lightbox-close" aria-label="Close">✕</button>
            <div id="about-content" class="about-content">Loading…</div>
        </div>
    </div>

    <!-- Zoom lightbox (long-press on touch, double-click / ⛶ on pointer-fine). -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-inner">
            <button id="lightbox-close" class="icon-btn lightbox-close" aria-label="Close">✕</button>
            <button id="lightbox-save" class="lightbox-save" aria-label="Save image">⤓ Save</button>
            <button id="lightbox-export-stl" class="lightbox-save lightbox-export-stl" aria-label="Export STL for 3D printing">⤓ STL</button>
            <button id="lightbox-export-wav" class="lightbox-save lightbox-export-wav" aria-label="Export WAV audio">⤓ WAV</button>
            <button id="lightbox-export-midi" class="lightbox-save lightbox-export-midi" aria-label="Export MIDI file">⤓ MIDI</button>
            <canvas id="lightbox-canvas" width="768" height="768"></canvas>
            <div id="lightbox-info" class="genome-content"></div>
        </div>
    </div>

    <script src="https://d3js.org/d3-color.v3.min.js"></script>
    <script src="https://d3js.org/d3-interpolate.v3.min.js"></script>
    <script src="https://d3js.org/d3-scale-chromatic.v3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="vendor/pto-bundle.js"></script>
    <script src="Palette.js"></script>
    <script src="Photo.js"></script>
    <script src="AudioClip.js"></script>
    <script src="ExportNaming.js"></script>
    <script src="ImageSave.js"></script>
    <script src="MeshExport.js"></script>
    <script src="AudioExport.js"></script>
    <script src="MidiExport.js"></script>
    <script src="Individual.js"></script>
    <script src="PaletteControlUI.js"></script>
    <script src="PhotoControlUI.js"></script>
    <script src="AudioControlUI.js"></script>
    <script src="MIDISync.js"></script>
    <script src="MIDISyncUI.js"></script>
    <script src="PerformanceControls.js"></script>
    <script src="CodeEditorUI.js"></script>

    <!-- Representation and Modality helpers -->
    <script src="representations/TreeRepresentation.js"></script>
    <script src="representations/DAGRepresentation.js"></script>
    <script src="representations/PTORepresentation.js"></script>
    <script src="modalities/Canvas2DModality.js"></script>
    <script src="modalities/MIDIModality.js"></script>
    <script src="modalities/AudioModality.js"></script>
    <script src="modalities/ThreeDModality.js"></script>

    <!-- Individual types -->
    <script src="GridIndividual.js"></script>
    <script src="ShapesIndividual.js"></script>
    <script src="PhotoFilterIndividual.js"></script>
    <script src="AntRenderingIndividual.js"></script>
    <script src="AudioFilterIndividual.js"></script>
    <script src="DrumMachineIndividual.js"></script>
    <script src="MelodyIndividual.js"></script>
    <script src="MouseMusicIndividual.js"></script>
    <script src="EEGPreprocessing.js"></script>
    <script src="EEGSonificationIndividual.js"></script>
    <script src="PatternIndividual.js"></script>
    <script src="Grammar.js"></script>
    <script src="PatternGrammarIndividual.js"></script>
    <script src="AnimatedPatternIndividual.js"></script>
    <script src="PolarCurveIndividual.js"></script>
    <script src="AnemoneIndividual.js"></script>
    <script src="BranchIndividual.js"></script>
    <script src="LSystemIndividual.js"></script>
    <script src="BlindWatchmakerIndividual.js"></script>
    <script src="SuperShapeIndividual.js"></script>
    <script src="RadialSurface3DIndividual.js"></script>
    <script src="SuperShape3DIndividual.js"></script>
    <script src="PetalSphere3DIndividual.js"></script>
    <script src="FreeSurface3DIndividual.js"></script>
    <script src="WarpedSurface3DIndividual.js"></script>
    <script src="RobotIndividual.js"></script>
    <script src="WonkyGuysIndividual.js"></script>
    <script src="HoxCreatureIndividual.js"></script>
    <script src="SheepIndividual.js"></script>
    <script src="PenroseIndividual.js"></script>
    <script src="PSystemIndividual.js"></script>
    <script src="EvolutionaryAlgorithm.js"></script>
    <script src="Anemone.js"></script>
    <script src="main.js"></script>
</body>
</html>
