<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anemone Interactive Evolutionary Algorithm</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top app bar: persistent chrome. On wide pointer-fine screens it carries
         an inline Evolve button; on touch/narrow that role moves to the FAB. -->
    <header class="app-bar">
        <button id="menu-btn" class="icon-btn" aria-label="Open controls">☰</button>
        <h1 class="app-title">Anemone</h1>
        <span class="gen-indicator">Gen <span id="generation">0</span></span>
        <button id="evolve-btn" class="evolve-bar">
            Evolve<span class="sel-badge" id="selected-count-bar">0</span>
        </button>
    </header>

    <main class="container">
        <div class="grid" id="grid"></div>
    </main>

    <!-- Floating Evolve button (touch / narrow): thumb-reachable. -->
    <button id="evolve-fab" class="fab" aria-label="Evolve next generation">
        <span class="fab-icon">⟳</span>
        <span class="sel-badge" id="selected-count-fab">0</span>
    </button>

    <!-- Auxiliary controls drawer (everywhere). -->
    <div id="drawer-scrim" class="scrim"></div>
    <aside id="drawer" class="drawer" aria-label="Controls">
        <div class="drawer-header">
            <h2>Controls</h2>
            <button id="drawer-close" class="icon-btn" aria-label="Close controls">✕</button>
        </div>

        <section class="drawer-section">
            <h3>Population</h3>
            <button id="reset-btn" class="secondary-btn">Reset</button>
            <div class="info-line">
                Selected <span id="selected-count">0</span> ·
                Pop <span id="population-size">16</span> ·
                Avg <span id="avg-fitness">0.00</span>
            </div>
        </section>

        <section class="drawer-section">
            <h3>Individual Type</h3>
            <select id="individual-type-select">
                <option value="PatternIndividual">Pattern</option>
                <option value="PatternGrammarIndividual">Pattern (Grammar)</option>
                <option value="PolarCurveIndividual">Polar Curve</option>
                <option value="ShapesIndividual">Shapes</option>
                <option value="GridIndividual">Grid</option>
                <option value="SuperShapeIndividual">Supershape</option>
                <option value="SuperShape3DIndividual">Supershape 3D</option>
                <option value="AnemoneIndividual" selected>Anemone</option>
                <option value="RobotIndividual">Robot</option>
                <option value="SheepIndividual">Sheep</option>
                <option value="PenroseIndividual">Penrose</option>
                <option value="MelodyIndividual">Melody</option>
                <option value="MouseMusicIndividual">Mouse Music</option>
                <option value="EEGSonificationIndividual">EEG Sonification</option>
            </select>
            <button id="switch-individual-type-btn" class="secondary-btn">Switch</button>
        </section>

        <section class="drawer-section eeg-section">
            <h3>EEG Data</h3>
            <button id="eeg-load-btn" class="secondary-btn">Load EEG CSV</button>
            <input type="file" id="eeg-csv-input" accept=".csv" style="display: none;">
            <span id="eeg-status"><em>No data</em></span>
        </section>

        <section class="drawer-section" id="palette-section">
            <h3>Palette</h3>
            <div id="extensions-container" class="extensions-container"></div>
        </section>

        <section class="drawer-section">
            <h3>Generation History</h3>
            <div id="history-list" class="history-list"></div>
        </section>

        <footer class="drawer-footer">
            <a href="https://github.com/jmmcd/anemone" target="_blank" rel="noopener noreferrer">View on GitHub</a>
        </footer>
    </aside>

    <!-- Zoom lightbox (long-press on touch, double-click / ⛶ on pointer-fine). -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-inner">
            <button id="lightbox-close" class="icon-btn lightbox-close" aria-label="Close">✕</button>
            <canvas id="lightbox-canvas" width="512" height="512"></canvas>
            <div id="lightbox-info" class="genome-content"></div>
        </div>
    </div>

    <script src="https://d3js.org/d3-color.v3.min.js"></script>
    <script src="https://d3js.org/d3-interpolate.v3.min.js"></script>
    <script src="https://d3js.org/d3-scale-chromatic.v3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://threejs.org/examples/js/controls/OrbitControls.js"></script>
    <script src="Palette.js"></script>
    <script src="Individual.js"></script>
    <script src="PaletteControlUI.js"></script>

    <!-- Representation and Modality helpers -->
    <script src="representations/TreeRepresentation.js"></script>
    <script src="representations/BinaryRepresentation.js"></script>
    <script src="representations/IntegerRepresentation.js"></script>
    <script src="representations/FloatRepresentation.js"></script>
    <script src="representations/GrammaticalRepresentation.js"></script>
    <script src="representations/DAGRepresentation.js"></script>
    <script src="modalities/Canvas2DModality.js"></script>
    <script src="modalities/MIDIModality.js"></script>
    <script src="modalities/ThreeDModality.js"></script>

    <!-- Individual types -->
    <script src="GridIndividual.js"></script>
    <script src="ShapesIndividual.js"></script>
    <script src="MelodyIndividual.js"></script>
    <script src="MouseMusicIndividual.js"></script>
    <script src="EEGPreprocessing.js"></script>
    <script src="EEGSonificationIndividual.js"></script>
    <script src="PatternIndividual.js"></script>
    <script src="Grammar.js"></script>
    <script src="PatternGrammarIndividual.js"></script>
    <script src="PolarCurveIndividual.js"></script>
    <script src="AnemoneIndividual.js"></script>
    <script src="SuperShapeIndividual.js"></script>
    <script src="SuperShape3DIndividual.js"></script>
    <script src="RobotIndividual.js"></script>
    <script src="SheepIndividual.js"></script>
    <script src="PenroseIndividual.js"></script>
    <script src="EvolutionaryAlgorithm.js"></script>
    <script src="Anemone.js"></script>
    <script src="main.js"></script>
</body>
</html>
